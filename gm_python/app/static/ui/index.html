<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STB Control - MediaStar 4030</title>
    <link rel="icon" href="data:," />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        html, body { height: 100%; }
        body {
            background: radial-gradient(1000px 520px at 15% 0%, rgba(99,102,241,0.18), transparent 58%),
                        radial-gradient(1000px 520px at 85% 0%, rgba(34,211,238,0.10), transparent 58%),
                        #070b18;
        }

        body { color: #e5e7eb; }

        .app-shell { height: 100%; overflow: auto; }

        .min-h-0 { min-height: 0; }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 999px;
            display: inline-block;
        }
        .status-dot.connected { background: #10b981; }
        .status-dot.disconnected { background: #ef4444; }
        .status-dot.connecting { background: #f59e0b; }

        #channelListContainer { min-height: 0; overflow: auto; }
        #favoritesContainer { min-height: 0; overflow: auto; }

        .channel-item { cursor: pointer; }
        .favorite-star { cursor: pointer; }

        .progress { background-color: rgba(255,255,255,0.08); }
    </style>
</head>
<body>
    <div class="container-fluid app-shell d-flex flex-column p-2 gap-2">
        <!-- Header -->
        <header class="d-flex align-items-center justify-content-between bg-dark bg-opacity-50 border border-secondary rounded-3 px-3 py-2">
            <div class="d-flex align-items-center gap-2">
                <span class="badge text-bg-primary">STB</span>
                <span class="fw-semibold">GMScreen</span>
                <span class="text-secondary small">MediaStar 4030</span>
            </div>
            <div class="d-flex align-items-center gap-2" id="connectionStatus">
                <span class="status-dot disconnected" id="statusDot"></span>
                <span class="small" id="statusText">WebSocket disconnected</span>
                <button class="btn btn-sm btn-outline-light" id="reconnectBtn" onclick="app.manualReconnect()" style="display: none;">Reconnect</button>
            </div>
        </header>

        <!-- Main Content -->
        <div class="row g-2 flex-grow-1 min-h-0">
            <!-- Left Panel -->
            <div class="col-lg-8 d-flex flex-column gap-2 min-h-0">
                <!-- Connection Card -->
                <div class="card bg-dark bg-opacity-50 border-secondary">
                    <div class="card-body py-2">
                        <div class="row g-2 align-items-center">
                            <div class="col-md-5">
                                <label class="form-label small text-secondary mb-1">STB IP</label>
                                <input type="text" class="form-control form-control-sm" id="stbIp" placeholder="192.168.1.100" value="192.168.1.100">
                            </div>
                            <div class="col-md-2">
                                <label class="form-label small text-secondary mb-1">Port</label>
                                <input type="number" class="form-control form-control-sm" id="stbPort" placeholder="20000" value="20000">
                            </div>
                            <div class="col-md-5 d-flex gap-2 align-items-end">
                                <button class="btn btn-sm btn-primary" id="connectBtn">Connect</button>
                                <button class="btn btn-sm btn-outline-light" id="disconnectBtn" style="display: none;">Disconnect</button>
                                <button class="btn btn-sm btn-outline-info" id="refreshChannelsBtn">Refresh Channels</button>
                            </div>
                        </div>
                        <div class="row g-2 align-items-end mt-2">
                            <div class="col-md-7">
                                <label class="form-label small text-secondary mb-1">Discovered</label>
                                <select class="form-select form-select-sm" id="discoveredSelect" disabled></select>
                            </div>
                            <div class="col-md-5 d-flex gap-2 align-items-end">
                                <button class="btn btn-sm btn-outline-secondary" id="discoverBtn">Find STB</button>
                            </div>
                        </div>
                        <div class="mt-2 d-none" id="connectionInfo">
                            <div class="row g-2">
                                <div class="col-md-6"><span class="text-secondary small">Model:</span> <span class="small" id="deviceModel">-</span></div>
                                <div class="col-md-6"><span class="text-secondary small">Address:</span> <span class="small" id="deviceSerial">-</span></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Channels Card -->
                <div class="card bg-dark bg-opacity-50 border-secondary flex-grow-1 min-h-0">
                    <div class="card-header bg-transparent border-secondary py-2">
                        <div class="d-flex align-items-center justify-content-between w-100 gap-2">
                            <div class="d-flex align-items-center gap-3">
                                <span class="fw-semibold">Channels</span>
                                <span class="text-secondary small" id="cacheText">Cache invalid</span>
                            </div>
                            <div class="d-flex gap-2">
                                <div class="btn-group btn-group-sm" role="group" aria-label="Channel tabs">
                                    <button type="button" class="btn btn-outline-light tab active" data-tab="all">All</button>
                                    <button type="button" class="btn btn-outline-light tab" data-tab="favorites">Favorites</button>
                                </div>
                            </div>
                        </div>
                        <div class="mt-2 d-none" id="channelsProgressWrap">
                            <div class="d-flex align-items-center justify-content-between mb-1">
                                <span class="text-secondary small" id="channelsProgressText">Loading channels…</span>
                                <span class="text-secondary small" id="channelsProgressCount">0/0</span>
                            </div>
                            <div class="progress" style="height: 6px;">
                                <div class="progress-bar" id="channelsProgressBar" role="progressbar" style="width: 0%" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"></div>
                            </div>
                        </div>
                    </div>
                    <div class="card-body d-flex flex-column gap-2 min-h-0">
                        <input type="text" class="form-control form-control-sm" id="searchInput" placeholder="Search channels...">
                        <div id="channelListContainer" class="list-group list-group-flush rounded-2 flex-grow-1"></div>
                    </div>
                </div>
            </div>

            <!-- Right Panel -->
            <div class="col-lg-4 d-flex flex-column gap-2 min-h-0">
                <!-- Remote Control -->
                <div class="card bg-dark bg-opacity-50 border-secondary">
                    <div class="card-header bg-transparent border-secondary py-2">
                        <span class="fw-semibold">Remote</span>
                    </div>
                    <div class="card-body py-2">
                        <div class="row g-2">
                            <div class="col-12">
                                <div class="d-grid" style="grid-template-columns: repeat(3, 1fr); gap: .5rem;">
                                    <button class="btn btn-sm btn-outline-light" data-key="1">1</button>
                                    <button class="btn btn-sm btn-outline-light" data-key="2">2</button>
                                    <button class="btn btn-sm btn-outline-light" data-key="3">3</button>
                                    <button class="btn btn-sm btn-outline-light" data-key="4">4</button>
                                    <button class="btn btn-sm btn-outline-light" data-key="5">5</button>
                                    <button class="btn btn-sm btn-outline-light" data-key="6">6</button>
                                    <button class="btn btn-sm btn-outline-light" data-key="7">7</button>
                                    <button class="btn btn-sm btn-outline-light" data-key="8">8</button>
                                    <button class="btn btn-sm btn-outline-light" data-key="9">9</button>
                                    <button class="btn btn-sm btn-outline-light" data-key="*">*</button>
                                    <button class="btn btn-sm btn-outline-light" data-key="0">0</button>
                                    <button class="btn btn-sm btn-outline-light" data-key="#">#</button>
                                </div>
                            </div>
                            <div class="col-12 d-flex gap-2 justify-content-between">
                                <button class="btn btn-sm btn-outline-light flex-fill" data-key="up">Up</button>
                                <button class="btn btn-sm btn-outline-light flex-fill" data-key="down">Down</button>
                                <button class="btn btn-sm btn-outline-light flex-fill" data-key="left">Left</button>
                                <button class="btn btn-sm btn-outline-light flex-fill" data-key="right">Right</button>
                                <button class="btn btn-sm btn-primary flex-fill" data-key="ok">OK</button>
                            </div>
                            <div class="col-12 d-flex gap-2 justify-content-between">
                                <button class="btn btn-sm btn-outline-light flex-fill" data-key="menu">Menu</button>
                                <button class="btn btn-sm btn-outline-light flex-fill" data-key="back">Back</button>
                                <button class="btn btn-sm btn-outline-light flex-fill" data-key="exit">Exit</button>
                                <button class="btn btn-sm btn-outline-light flex-fill" data-key="info">Info</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Favorites Management -->
                <div class="card bg-dark bg-opacity-50 border-secondary flex-grow-1 min-h-0">
                    <div class="card-header bg-transparent border-secondary py-2 d-flex justify-content-between align-items-center">
                        <span class="fw-semibold">Favorites</span>
                        <button class="btn btn-sm btn-outline-light" id="addGroupBtn">Add Group</button>
                    </div>
                    <div class="card-body py-2 min-h-0 d-flex flex-column">
                        <div id="favoritesContainer" class="d-flex flex-column gap-2 flex-grow-1"></div>
                    </div>
                </div>

                <!-- System Status -->
                <div class="card bg-dark bg-opacity-50 border-secondary">
                    <div class="card-header bg-transparent border-secondary py-2">
                        <span class="fw-semibold">Status</span>
                    </div>
                    <div class="card-body py-2">
                        <div class="row g-2 small">
                            <div class="col-6 text-secondary">Channels</div>
                            <div class="col-6 text-end" id="channelCount">0</div>
                            <div class="col-6 text-secondary">Favorites</div>
                            <div class="col-6 text-end" id="favoritesCount">0</div>
                            <div class="col-6 text-secondary">Current</div>
                            <div class="col-6 text-end" id="currentChannel">-</div>
                            <div class="col-6 text-secondary">Cache</div>
                            <div class="col-6 text-end" id="cacheStatus">Invalid</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification Container -->
    <div id="notificationContainer" class="toast-container position-fixed top-0 end-0 p-2" style="z-index: 1080;"></div>

    <!-- JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="/static/ui/app.js"></script>
</body>
</html>
